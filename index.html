<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Photography Portfolio</title>
	<link rel="stylesheet" href="Css/style.css">
</head>
<body> 
    <nav class="navbar">
        <div class="logo">
            <a href="index.html">
                <img src="Assets/Logo (1).png" alt="Logo">
            </a>
        </div>
        <ul class="nav-menu">
            <li><a href="index.html" class="active">Home</a></li>
            <li><a href="about.html">About</a></li>
            <li><a href="work.html">Work</a></li>
            <li><a href="contact.html">Contact</a></li>
        </ul>
        <div class="hamburger">
            <span></span>
            <span></span>
            <span></span>
        </div>
    </nav>

    <!-- Hero Section com Slideshow -->
    <section class="hero">
        <div class="slideshow-container">
            <!-- Slides -->
            <div class="slide fade">
                <img src="Assets/Imagens/01.jpg" alt="Slide 1">
            </div>
            <div class="slide fade">
                <img src="Assets/Imagens/02.png" alt="Slide 2">
            </div>
            <div class="slide fade">
                <img src="Assets/Imagens/03.jpg" alt="Slide 3">
            </div>
            <div class="slide fade">
                <img src="Assets/Imagens/04.jpg" alt="Slide 4">
            </div>
            <!-- Adiciona mais slides aqui -->

            <!-- Setas de Navegação -->
            <a class="prev" onclick="changeSlide(-1)">&#10094;</a>
            <a class="next" onclick="changeSlide(1)">&#10095;</a>

            <!-- Indicador (4/10) -->
            <div class="slide-indicator">
                <span id="current-slide">1</span> / <span id="total-slides">4</span>
            </div>

            <!-- Dots (Pontos de navegação) -->
            <div class="dots">
                <span class="dot" onclick="goToSlide(0)"></span>
                <span class="dot" onclick="goToSlide(1)"></span>
                <span class="dot" onclick="goToSlide(2)"></span>
                <span class="dot" onclick="goToSlide(3)"></span>
            </div>
        </div>
    </section>

    <script src="js/script.js"></script>
</body>
</html>
